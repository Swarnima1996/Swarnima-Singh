[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --html=reports/test_report.html
    --self-contained-html
    --tb=short
markers =
    smoke: Fast, critical-path tests
    regression: Full regression suite
    create: Tests for POST (Create) operations
    read: Tests for GET (Read) operations
    update: Tests for PUT/POST (Update) operations
    delete: Tests for DELETE operations
    negative: Tests for error/edge case scenarios
